name: Check project URLs

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write         # Needed to open/update the report issue

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run link checker
        id: check
        run: |
          python3 _check_links.py --summary > link_report.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Read report
        id: report
        run: |
          REPORT=$(cat link_report.txt)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Open or update GitHub Issue on failure
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.report.outputs.report }}`;
            const title = "Dead links found in projects.yml";
            const body = [
              "The weekly link checker found one or more dead URLs in `_data/projects.yml`.",
              "",
              "```",
              report,
              "```",
              "",
              "**To fix:** update the URL in `_data/projects.yml`, or add it to `_data/link_exceptions.yml` if it is intentionally restricted.",
              "",
              `_Generated by [check-links workflow](https://github.com/${{ github.repository }}/actions/workflows/check-links.yml) on ${new Date().toISOString().split('T')[0]}_`
            ].join("\n");

            // Look for an existing open issue with the same title
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "dead-link",
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Updated report:\n\n${body}`,
              });
              console.log(`Updated issue #${existing.data[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["dead-link"],
              });
              console.log("Created new issue");
            }

      - name: Close dead-link issue if all links pass
        if: steps.check.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "dead-link",
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
              });
              console.log(`Closed issue #${issue.number} — all links now passing`);
            }
